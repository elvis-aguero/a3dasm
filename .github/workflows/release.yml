name: release

# Disabled until the repository/package is made public. Flip the switch by
# setting the repository variable ENABLE_PYPI_RELEASE to 'true' and adding the
# pypi_api_token secret. Until then this job is skipped on every push.
on:
  push:
    branches:
      - main

jobs:
  build:
    if: ${{ vars.ENABLE_PYPI_RELEASE == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Release
        uses: patrick-kidger/action_update_python_project@v8
        with:
          python-version: "3.11"
          test-script: |
            cp -r ${{ github.workspace }}/tests ./tests
            cp ${{ github.workspace }}/pyproject.toml ./pyproject.toml
            uv sync --extra tests --extra all --no-install-project --inexact
            uv run --no-sync pytest -m "not integration and not ollama"
          pypi-token: ${{ secrets.pypi_api_token }}
          github-user: bessagroup
          github-token: ${{ github.token }}
