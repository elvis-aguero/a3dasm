name: Tests

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    # Full OS x version matrix nightly, independent of push/PR activity, so
    # version-specific regressions (e.g. the py3.10 cf.TimeoutError bug,
    # 410ac0d) surface even between merges.
    - cron: "0 6 * * *"

jobs:
  run-tests:
    strategy:
      matrix:
        # a3dasm is POSIX/HPC-oriented (process-group reaping, signals, SLURM);
        # Windows is not a supported target.
        #
        # Every PR push runs a single fast combo (quick feedback loop); the
        # full matrix runs on push to main (post-merge) and nightly, so
        # cross-version bugs still surface without gating every PR iteration
        # on the full 2-OS x 4-version grid.
        os: >-
          ${{ github.event_name == 'pull_request'
              && fromJSON('["ubuntu-latest"]')
              || fromJSON('["ubuntu-latest", "macos-latest"]') }}
        version: >-
          ${{ github.event_name == 'pull_request'
              && fromJSON('["3.12"]')
              || fromJSON('["3.10", "3.11", "3.12", "3.13"]') }}
      fail-fast: false
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install '.[tests,all]'
      - name: Test with pytest
        run: |
          pytest -m "not integration and not ollama"
  build-docs:
    strategy:
      matrix:
        os: [ubuntu-latest]
        version: ["3.10"]
      fail-fast: false
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --editable '.[docs,all]'
      - name: Build documentation
        run: |
          mkdocs build
  check_pre-commit:
    strategy:
      matrix:
        os: [ubuntu-latest]
        version: ["3.10"]
      fail-fast: false
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.version }}
      - name: Install pre-commit
        run: |
          python -m pip install --upgrade pip
          python -m pip install '.[dev]'
      - name: Run pre-commit checks
        run: |
          pre-commit run --all-files
