name: Tests

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  run-tests:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        version: ["3.10", "3.11", "3.12", "3.13"]
      fail-fast: false
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install '.[tests,all]'
      - name: Test with pytest
        run: |
          pytest -m "not integration and not ollama"
  build-docs:
    strategy:
      matrix:
        os: [ubuntu-latest]
        version: ["3.10"]
      fail-fast: false
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --editable '.[docs,all]'
      - name: Build documentation
        run: |
          mkdocs build
  check_pre-commit:
    strategy:
      matrix:
        os: [ubuntu-latest]
        version: ["3.10"]
      fail-fast: false
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.version }}
      - name: Install pre-commit
        run: |
          python -m pip install --upgrade pip
          python -m pip install '.[dev]'
      - name: Run pre-commit checks
        run: |
          pre-commit run --all-files
